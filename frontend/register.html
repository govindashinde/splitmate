<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — SplitMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <a href="index.html"><span class="brand-icon">⟁</span><span class="brand-name">SplitMate</span></a>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Start splitting expenses with your group.</p>

      <div id="auth-error" class="alert alert-error hidden"></div>
      <div id="auth-success" class="alert alert-success hidden"></div>

      <div class="form-group">
        <label class="form-label">Full name <span class="hint">(letters only)</span></label>
        <input type="text" id="name" class="form-input" placeholder="Arjun Sharma" oninput="validateName(this)" />
        <span id="name-msg" class="field-msg"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" oninput="validateEmail(this)" />
        <span id="email-msg" class="field-msg"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span class="hint">(strong password required)</span></label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" oninput="validatePassword(this)" />
        <div class="password-rules" id="pw-rules">
          <div class="pw-rule" id="rule-len">✗ At least 8 characters</div>
          <div class="pw-rule" id="rule-upper">✗ At least one uppercase letter (A-Z)</div>
          <div class="pw-rule" id="rule-lower">✗ At least one lowercase letter (a-z)</div>
          <div class="pw-rule" id="rule-num">✗ At least one number (0-9)</div>
          <div class="pw-rule" id="rule-special">✗ At least one special character (!@#$%)</div>
        </div>
      </div>

      <button id="reg-btn" class="btn btn-primary btn-full" onclick="handleRegister()">Create account</button>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <style>
    .field-msg { font-size: 0.78rem; margin-top: 3px; display: block; min-height: 16px; }
    .field-msg.error { color: #C0392B; }
    .field-msg.success { color: #27AE60; }
    .password-rules { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .pw-rule { font-size: 0.78rem; color: #9E9891; transition: color 0.2s; }
    .pw-rule.pass { color: #27AE60; }
    .pw-rule.pass::first-letter { }
    .form-input.input-error { border-color: #C0392B; }
    .form-input.input-ok { border-color: #27AE60; }
  </style>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

    // ── Live validators ──

    function validateName(input) {
      const val = input.value.trim();
      const msg = document.getElementById('name-msg');
      const onlyLetters = /^[A-Za-z\s]+$/.test(val);

      if (!val) {
        setField(input, msg, '', 'neutral'); return;
      }
      if (!onlyLetters) {
        setField(input, msg, 'Name must contain letters only — no numbers or symbols.', 'error'); return;
      }
      if (val.length < 2) {
        setField(input, msg, 'Name must be at least 2 characters.', 'error'); return;
      }
      if (val.length > 50) {
        setField(input, msg, 'Name must be under 50 characters.', 'error'); return;
      }
      setField(input, msg, '✓ Looks good!', 'success');
    }

    function validateEmail(input) {
      const val = input.value.trim();
      const msg = document.getElementById('email-msg');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!val) { setField(input, msg, '', 'neutral'); return; }
      if (!emailRegex.test(val)) {
        setField(input, msg, 'Enter a valid email like name@example.com', 'error'); return;
      }
      setField(input, msg, '✓ Valid email!', 'success');
    }

    function validatePassword(input) {
      const val = input.value;
      const checks = {
        len:     val.length >= 8,
        upper:   /[A-Z]/.test(val),
        lower:   /[a-z]/.test(val),
        num:     /[0-9]/.test(val),
        special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(val)
      };
      const rules = {
        'rule-len':     { pass: checks.len,     text: '8+ characters' },
        'rule-upper':   { pass: checks.upper,   text: 'At least one uppercase letter (A-Z)' },
        'rule-lower':   { pass: checks.lower,   text: 'At least one lowercase letter (a-z)' },
        'rule-num':     { pass: checks.num,     text: 'At least one number (0-9)' },
        'rule-special': { pass: checks.special, text: 'At least one special character (!@#$%)' }
      };
      Object.entries(rules).forEach(([id, { pass, text }]) => {
        const el = document.getElementById(id);
        el.textContent = (pass ? '✓ ' : '✗ ') + text;
        el.classList.toggle('pass', pass);
      });
      const allPass = Object.values(checks).every(Boolean);
      input.classList.toggle('input-ok', allPass);
      input.classList.toggle('input-error', val.length > 0 && !allPass);
    }

    function setField(input, msgEl, text, type) {
      msgEl.textContent = text;
      msgEl.className = 'field-msg' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
      input.classList.toggle('input-error', type === 'error');
      input.classList.toggle('input-ok', type === 'success');
    }

    function isPasswordStrong(pw) {
      return pw.length >= 8 &&
        /[A-Z]/.test(pw) &&
        /[a-z]/.test(pw) &&
        /[0-9]/.test(pw) &&
        /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw);
    }

    // ── Submit handler ──
    async function handleRegister() {
      const btn = document.getElementById('reg-btn');
      const errorEl = document.getElementById('auth-error');
      const successEl = document.getElementById('auth-success');
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');

      // Name validation
      if (!name) { showMsg(errorEl, 'Full name is required.'); return; }
      if (!/^[A-Za-z\s]+$/.test(name)) { showMsg(errorEl, 'Name must contain letters only — no numbers or symbols.'); return; }
      if (name.length < 2) { showMsg(errorEl, 'Name must be at least 2 characters.'); return; }
      if (name.length > 50) { showMsg(errorEl, 'Name must be under 50 characters.'); return; }

      // Email validation
      if (!email) { showMsg(errorEl, 'Email address is required.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMsg(errorEl, 'Please enter a valid email address.'); return; }

      // Strong password validation
      if (!password) { showMsg(errorEl, 'Password is required.'); return; }
      if (!isPasswordStrong(password)) {
        showMsg(errorEl, 'Password is too weak. Please meet all the requirements shown below.'); return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const data = await api.post('/auth/register', { name, email, password });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showMsg(successEl, '✅ Account created! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        showMsg(errorEl, err.message || 'Registration failed.');
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    }

    function showMsg(el, msg) {
      el.textContent = msg;
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
