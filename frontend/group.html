<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group — SplitMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-page">

  <nav class="app-nav">
    <div class="nav-brand">
      <a href="dashboard.html" class="back-btn">← </a>
      <span class="brand-icon">⟁</span>
      <span class="brand-name">SplitMate</span>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user-name"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-label">Group Menu</h3>
        <a href="#expenses" class="sidebar-link active" onclick="showTab('expenses')">🧾 Expenses</a>
        <a href="#balances" class="sidebar-link" onclick="showTab('balances')">⚖️ Balances</a>
        <a href="#members" class="sidebar-link" onclick="showTab('members')">👥 Members</a>
        <a href="#info" class="sidebar-link" onclick="showTab('info')">ℹ️ Info</a>
      </div>
      <div class="sidebar-section">
        <h3 class="sidebar-label">Actions</h3>
        <a href="dashboard.html" class="sidebar-link">← All Groups</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header" id="group-header">
        <div>
          <h1 class="page-title" id="group-title">Loading...</h1>
          <p class="page-sub" id="group-sub"></p>
        </div>
        <button class="btn btn-primary" onclick="showAddExpenseModal()">+ Add Expense</button>
      </div>

      <!-- EXPENSES TAB -->
      <div id="tab-expenses" class="tab-content">
        <div class="expense-filters">
          <select id="filter-category" class="form-input input-sm" onchange="filterExpenses()">
            <option value="">All categories</option>
            <option value="food">🍕 Food</option>
            <option value="transport">🚗 Transport</option>
            <option value="accommodation">🏨 Accommodation</option>
            <option value="entertainment">🎭 Entertainment</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="utilities">💡 Utilities</option>
            <option value="other">📦 Other</option>
          </select>
        </div>
        <div id="expenses-list" class="expenses-list">
          <div class="loading-state">Loading expenses...</div>
        </div>
      </div>

      <!-- BALANCES TAB -->
      <div id="tab-balances" class="tab-content hidden">
        <div id="balances-content">
          <div class="loading-state">Calculating balances...</div>
        </div>
      </div>

      <!-- MEMBERS TAB -->
      <div id="tab-members" class="tab-content hidden">
        <div class="invite-box" id="invite-box">
          <div>
            <p class="invite-label">Invite Code</p>
            <p class="invite-code" id="invite-code-display">—</p>
          </div>
          <div>
            <button class="btn btn-outline btn-sm" onclick="copyInviteCode()">Copy Code</button>
          </div>
        </div>
        <div class="form-row" style="margin-top:1rem;">
          <input type="email" id="invite-email" class="form-input" placeholder="friend@email.com" />
          <button class="btn btn-primary" onclick="inviteByEmail()">Add Member</button>
        </div>
        <div id="invite-msg" class="alert hidden" style="margin-top:0.5rem;"></div>
        <div id="members-list" class="members-list">Loading...</div>
      </div>

      <!-- INFO TAB -->
      <div id="tab-info" class="tab-content hidden">
        <div id="info-content" class="info-grid">Loading...</div>
      </div>
    </main>
  </div>

  <!-- ADD EXPENSE MODAL -->
  <div id="add-expense-modal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeModals()"></div>
    <div class="modal-card modal-lg">
      <div class="modal-header">
        <h2>Add Expense</h2>
        <button class="modal-close" onclick="closeModals()">✕</button>
      </div>
      <div class="form-row">
        <div class="form-group flex-1">
          <label class="form-label">Title</label>
          <input type="text" id="exp-title" class="form-input" placeholder="Hotel booking" />
        </div>
        <div class="form-group" style="width:140px">
          <label class="form-label">Amount (₹)</label>
          <input type="number" id="exp-amount" class="form-input" placeholder="1500" min="0" step="0.01" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group flex-1">
          <label class="form-label">Category</label>
          <select id="exp-category" class="form-input">
            <option value="food">🍕 Food</option>
            <option value="transport">🚗 Transport</option>
            <option value="accommodation">🏨 Accommodation</option>
            <option value="entertainment">🎭 Entertainment</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="utilities">💡 Utilities</option>
            <option value="other">📦 Other</option>
          </select>
        </div>
        <div class="form-group flex-1">
          <label class="form-label">Paid by</label>
          <select id="exp-paid-by" class="form-input"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes <span class="hint">(optional)</span></label>
        <input type="text" id="exp-notes" class="form-input" placeholder="Any extra details..." />
      </div>
      <div class="split-info">
        <span class="split-badge">⚖️ Split equally among all members</span>
      </div>
      <div id="exp-error" class="alert alert-error hidden"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
        <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
  <script>
    requireAuth();

    const user = getUser();
    document.getElementById('nav-user-name').textContent = user?.name || '';

    const params = new URLSearchParams(window.location.search);
    const groupId = params.get('id');
    if (!groupId) window.location.href = 'dashboard.html';

    let currentGroup = null;
    let allExpenses = [];

    init();

    async function init() {
      try {
        const data = await api.get(`/groups/${groupId}`);
        currentGroup = data.group;
        renderGroupHeader();
        renderMembers();
        renderInfo();
        await loadExpenses();
      } catch (err) {
        alert('Failed to load group. ' + err.message);
        window.location.href = 'dashboard.html';
      }
    }

    function renderGroupHeader() {
      const emojis = { trip: '🏕️', home: '🏠', food: '🍕', event: '🎉', other: '📦' };
      document.getElementById('group-title').textContent = `${emojis[currentGroup.category] || '📦'} ${currentGroup.name}`;
      document.getElementById('group-sub').textContent = `${currentGroup.members.length} members · Code: ${currentGroup.inviteCode}`;
      document.title = `${currentGroup.name} — SplitMate`;
    }

    async function loadExpenses() {
      const el = document.getElementById('expenses-list');
      try {
        const data = await api.get(`/expenses/group/${groupId}`);
        allExpenses = data.expenses || [];
        renderExpenses(allExpenses);
      } catch {
        el.innerHTML = '<div class="empty-state"><p>Failed to load expenses.</p></div>';
      }
    }

    function renderExpenses(expenses) {
      const el = document.getElementById('expenses-list');
      if (!expenses.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">🧾</div><h3>No expenses yet</h3><p>Add your first expense to get started.</p></div>`;
        return;
      }
      const catEmoji = { food:'🍕', transport:'🚗', accommodation:'🏨', entertainment:'🎭', shopping:'🛍️', utilities:'💡', other:'📦' };
      el.innerHTML = expenses.map(e => `
        <div class="expense-item">
          <div class="expense-icon">${catEmoji[e.category] || '📦'}</div>
          <div class="expense-info">
            <div class="expense-title">${e.title}</div>
            <div class="expense-meta">Paid by <strong>${e.paidBy?.name || 'Unknown'}</strong> · ${new Date(e.date).toLocaleDateString('en-IN', {day:'numeric',month:'short'})}</div>
          </div>
          <div class="expense-right">
            <div class="expense-amount">₹${e.amount.toFixed(2)}</div>
            ${e.createdBy?._id === (user?._id||user?.id) || e.createdBy === (user?._id||user?.id) ? `<button class="btn-icon-del" onclick="deleteExpense('${e._id}')">🗑</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function filterExpenses() {
      const cat = document.getElementById('filter-category').value;
      const filtered = cat ? allExpenses.filter(e => e.category === cat) : allExpenses;
      renderExpenses(filtered);
    }

    async function deleteExpense(id) {
      if (!confirm('Delete this expense?')) return;
      try {
        await api.delete(`/expenses/${id}`);
        await loadExpenses();
        if (document.getElementById('tab-balances').classList.contains('active')) loadBalances();
      } catch (err) { alert(err.message); }
    }

    async function loadBalances() {
      const el = document.getElementById('balances-content');
      el.innerHTML = '<div class="loading-state">Calculating...</div>';
      try {
        const data = await api.get(`/groups/${groupId}/balances`);
        const { balances, settlements } = data;
        const myId = (user?._id || user?.id || '').toString();
        const myBalance = balances.find(b => b.id === myId);
        const otherBalances = balances.filter(b => b.id !== myId);

        // For each other member, find what they owe me or I owe them
        const memberCards = otherBalances.map(b => {
          const settle = settlements.find(s =>
            (s.from === b.name && s.to === myBalance?.name) ||
            (s.to === b.name && s.from === myBalance?.name)
          );
          let label = 'settled', amt = 0, cls = '';
          if (settle) {
            if (settle.to === myBalance?.name) {
              amt = settle.amount; cls = 'positive'; label = 'owes you';
            } else {
              amt = settle.amount; cls = 'negative'; label = 'you owe';
            }
          }
          return `
            <div class="balance-card ${cls}">
              <div class="balance-avatar">${b.name[0].toUpperCase()}</div>
              <div class="balance-name">${b.name}</div>
              <div class="balance-amount ${cls}">
                ${cls === 'positive' ? '+' : cls === 'negative' ? '-' : ''}₹${amt.toFixed(2)}
              </div>
              <div class="balance-label">${label}</div>
            </div>`;
        }).join('');

        const mySettlements = settlements.filter(s =>
          s.from === myBalance?.name || s.to === myBalance?.name
        );

        el.innerHTML = `
          <div class="balances-section">
            <div class="my-balance-banner ${(myBalance?.balance||0) > 0 ? 'positive' : (myBalance?.balance||0) < 0 ? 'negative' : ''}">
              <div class="my-balance-label">Your overall balance</div>
              <div class="my-balance-amount">${(myBalance?.balance||0) >= 0 ? '+' : ''}₹${(myBalance?.balance||0).toFixed(2)}</div>
              <div class="my-balance-sub">${(myBalance?.balance||0) > 0 ? 'You are owed money' : (myBalance?.balance||0) < 0 ? 'You owe money' : 'You are all settled up!'}</div>
            </div>
            <h3 class="section-title" style="margin-top:1.5rem;margin-bottom:0.8rem">With each member</h3>
            <div class="balance-cards">
              ${memberCards || '<p style="color:var(--text-muted);font-size:0.9rem">No other members yet.</p>'}
            </div>
          </div>
          <div class="settlements-section">
            <h3 class="section-title">Your Settlements</h3>
            ${mySettlements.length ? mySettlements.map(s => `
              <div class="settlement-item">
                <span class="debtor">${s.from}</span>
                <span class="arrow">→ pays →</span>
                <span class="creditor">${s.to}</span>
                <span class="settlement-amount">₹${s.amount.toFixed(2)}</span>
              </div>
            `).join('') : '<div class="settled-badge">✅ You are all settled up!</div>'}
          </div>
          ${settlements.length > mySettlements.length ? `
          <div class="settlements-section" style="margin-top:1.5rem;opacity:0.65">
            <h3 class="section-title" style="font-size:0.82rem;color:var(--text-muted)">All group settlements</h3>
            ${settlements.map(s => `
              <div class="settlement-item" style="font-size:0.88rem">
                <span class="debtor">${s.from}</span>
                <span class="arrow">→ pays →</span>
                <span class="creditor">${s.to}</span>
                <span class="settlement-amount">₹${s.amount.toFixed(2)}</span>
              </div>
            `).join('')}
          </div>` : ''}
        `;
      } catch (err) {
        el.innerHTML = `<div class="empty-state"><p>Failed to load balances.</p></div>`;
      }
    }

    function renderMembers() {
      document.getElementById('invite-code-display').textContent = currentGroup.inviteCode;
      const el = document.getElementById('members-list');
      el.innerHTML = currentGroup.members.map(m => `
        <div class="member-item">
          <div class="member-avatar">${m.user.name[0].toUpperCase()}</div>
          <div class="member-info">
            <div class="member-name">${m.user.name} ${m.user._id === (user?._id||user?.id) ? '<span class="you-badge">You</span>' : ''}</div>
            <div class="member-email">${m.user.email}</div>
          </div>
          <div class="member-role ${m.role}">${m.role}</div>
        </div>
      `).join('');
    }

    async function inviteByEmail() {
      const email = document.getElementById('invite-email').value.trim();
      const msgEl = document.getElementById('invite-msg');
      msgEl.classList.add('hidden');
      if (!email) return;
      try {
        await api.post(`/groups/${groupId}/invite`, { email });
        msgEl.textContent = `${email} added to the group!`;
        msgEl.className = 'alert alert-success';
        msgEl.classList.remove('hidden');
        document.getElementById('invite-email').value = '';
        const data = await api.get(`/groups/${groupId}`);
        currentGroup = data.group;
        renderMembers();
      } catch (err) {
        msgEl.textContent = err.message;
        msgEl.className = 'alert alert-error';
        msgEl.classList.remove('hidden');
      }
    }

    function copyInviteCode() {
      navigator.clipboard.writeText(currentGroup.inviteCode);
      alert(`Invite code "${currentGroup.inviteCode}" copied!`);
    }

    function renderInfo() {
      const el = document.getElementById('info-content');
      el.innerHTML = `
        <div class="info-card"><div class="info-label">Group Name</div><div class="info-value">${currentGroup.name}</div></div>
        <div class="info-card"><div class="info-label">Category</div><div class="info-value">${currentGroup.category}</div></div>
        <div class="info-card"><div class="info-label">Invite Code</div><div class="info-value code">${currentGroup.inviteCode}</div></div>
        <div class="info-card"><div class="info-label">Created By</div><div class="info-value">${currentGroup.createdBy?.name}</div></div>
        <div class="info-card"><div class="info-label">Members</div><div class="info-value">${currentGroup.members.length}</div></div>
        <div class="info-card"><div class="info-label">Created On</div><div class="info-value">${new Date(currentGroup.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div></div>
        ${currentGroup.description ? `<div class="info-card full"><div class="info-label">Description</div><div class="info-value">${currentGroup.description}</div></div>` : ''}
      `;
    }

    function showAddExpenseModal() {
      const sel = document.getElementById('exp-paid-by');
      sel.innerHTML = currentGroup.members.map(m =>
        `<option value="${m.user._id}" ${m.user._id === (user?._id||user?.id) ? 'selected' : ''}>${m.user.name}</option>`
      ).join('');
      document.getElementById('add-expense-modal').classList.remove('hidden');
    }

    async function addExpense() {
      const title = document.getElementById('exp-title').value.trim();
      const amount = parseFloat(document.getElementById('exp-amount').value);
      const category = document.getElementById('exp-category').value;
      const paidBy = document.getElementById('exp-paid-by').value;
      const notes = document.getElementById('exp-notes').value.trim();
      const errEl = document.getElementById('exp-error');
      errEl.classList.add('hidden');

      if (!title || !amount || amount <= 0) {
        errEl.textContent = 'Title and a valid amount are required.';
        errEl.classList.remove('hidden'); return;
      }

      try {
        await api.post('/expenses', { groupId, title, amount, category, paidBy, splitType: 'equal', notes });
        closeModals();
        await loadExpenses();
        document.getElementById('exp-title').value = '';
        document.getElementById('exp-amount').value = '';
        document.getElementById('exp-notes').value = '';
      } catch (err) {
        errEl.textContent = err.message; errEl.classList.remove('hidden');
      }
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.remove('hidden');
      event.currentTarget.classList.add('active');
      if (tab === 'balances') loadBalances();
    }

    function closeModals() {
      document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
    }
  </script>
</body>
</html>
