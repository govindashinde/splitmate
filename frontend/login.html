<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — SplitMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <a href="index.html"><span class="brand-icon">⟁</span><span class="brand-name">SplitMate</span></a>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to see your groups and expenses.</p>

      <div id="auth-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" />
      </div>

      <button id="login-btn" class="btn btn-primary btn-full" onclick="handleLogin()">Log in</button>

      <p class="auth-switch">Don't have an account? <a href="register.html">Sign up free</a></p>


    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

async function handleLogin() {
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('auth-error');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errorEl.classList.add('hidden');
      if (!email || !password) {
        showError(errorEl, 'Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const data = await api.post('/auth/login', { email, password });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(errorEl, err.message || 'Login failed. Check credentials.');
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    }

    function showError(el, msg) {
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
